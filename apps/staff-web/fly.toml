# Fly app for the GymClassOS staff web app (React Router v7 SSR).
#
# Lives as a separate Fly app from gymos-edge-webhooks so each gets its
# own *.fly.dev URL. Shares the repo-root Dockerfile (built artifacts
# for all three apps land in the same image; the [processes] entry
# below selects staff-web as the runtime command).
#
# Region matches Neon's us-east-1 so DB calls stay sub-10ms.

app = "gymos-staff-web"
primary_region = "iad"

[build]
  dockerfile = "../../Dockerfile"

[env]
  NODE_ENV = "production"
  # Nitro's node preset reads PORT. Bind to 3000 (Nitro default).
  PORT = "3000"

[processes]
  web = "node apps/staff-web/.output/server/index.mjs"

[http_service]
  internal_port = 3000
  force_https = true
  # Always-on machine policy. Cold starts kill SSR responsiveness, and
  # Better-auth's session state survives in DB anyway.
  auto_stop_machines = "off"
  auto_start_machines = true
  min_machines_running = 1
  processes = ["web"]

  [[http_service.checks]]
    interval = "30s"
    timeout = "5s"
    grace_period = "15s"
    method = "GET"
    # Nitro serves the root route at /; a 200 here means the SSR handler
    # initialized cleanly (Drizzle, Better-auth, etc.). No dedicated
    # /healthz route in the framework yet.
    path = "/"
    protocol = "http"

[[vm]]
  size = "shared-cpu-1x"
  memory = "1gb"
  processes = ["web"]
