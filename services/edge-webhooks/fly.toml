# fly.toml app configuration file generated for gymos-edge-webhooks on 2026-05-22T17:51:41+01:00
#
# See https://fly.io/docs/reference/configuration/ for information about how to use this file.
#

app = 'gymos-edge-webhooks'
primary_region = 'iad'

[build]
  dockerfile = '../../Dockerfile'

[env]
  NODE_ENV = 'production'
  PORT = '3001'

[processes]
  web = 'node services/edge-webhooks/dist/index.js'
  worker = 'node services/worker/dist/index.js'

[http_service]
  internal_port = 3001
  force_https = true
  auto_stop_machines = 'off'
  auto_start_machines = true
  min_machines_running = 1
  processes = ['web']

  [[http_service.checks]]
    interval = '30s'
    timeout = '5s'
    grace_period = '10s'
    method = 'GET'
    path = '/healthz'
    protocol = 'http'

[[services]]
  protocol = 'tcp'
  internal_port = 3001
  processes = ['web']

  [[services.ports]]
    port = 443
    handlers = ['tls', 'http']

  [[services.ports]]
    port = 80
    handlers = ['http']
    force_https = true

  [services.concurrency]
    type = 'requests'
    hard_limit = 200
    soft_limit = 100

[[services]]
  protocol = 'tcp'
  internal_port = 3002
  auto_stop_machines = 'off'
  auto_start_machines = true
  min_machines_running = 1
  ports = []
  processes = ['worker']

  [[services.http_checks]]
    interval = '30s'
    timeout = '5s'
    grace_period = '20s'
    method = 'GET'
    path = '/healthz'
    protocol = 'http'

[[vm]]
  size = 'shared-cpu-1x'
  memory = '512mb'
  processes = ['web']

[[vm]]
  size = 'shared-cpu-1x'
  memory = '512mb'
  processes = ['worker']
