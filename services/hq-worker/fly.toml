# fly.toml for gymos-hq-worker
#
# hq-worker is a single-process worker (no public web surface).
# It boots pg-boss against the HQ Neon and serves /healthz on PORT 3003.
# BD2 adds provisioning saga queues; this skeleton keeps the /healthz
# contract identical so the Fly health check passes on first deploy.
#
# Operator setup (one-time, deferred — see BD1-04-SUMMARY.md):
#   fly app create gymos-hq-worker
#   fly secrets set DATABASE_URL_UNPOOLED=<hq-neon-unpooled-url> -a gymos-hq-worker
#   fly deploy -a gymos-hq-worker --config services/hq-worker/fly.toml

app = 'gymos-hq-worker'
primary_region = 'iad'

[build]
  dockerfile = 'Dockerfile'

[env]
  NODE_ENV = 'production'
  PORT = '3003'

# Single worker process — no web/worker process split needed here.
# The healthz endpoint is exposed internally for the Fly http_check.
[[services]]
  protocol = 'tcp'
  internal_port = 3003
  auto_stop_machines = 'off'
  auto_start_machines = true
  min_machines_running = 1
  ports = []

  [[services.http_checks]]
    interval = '30s'
    timeout = '5s'
    grace_period = '20s'
    method = 'GET'
    path = '/healthz'
    protocol = 'http'

[[vm]]
  size = 'shared-cpu-1x'
  memory = '512mb'
