<!doctype html>
<html>
  <head>
    <title>Slide 21 - Image Variations</title>
    <style>
      body {
        background: #111;
        color: #fff;
        font-family: system-ui;
        display: flex;
        flex-direction: column;
        align-items: center;
        gap: 32px;
        padding: 40px;
      }
      h1 {
        font-size: 24px;
        margin: 0;
      }
      .grid {
        display: grid;
        grid-template-columns: repeat(3, 1fr);
        gap: 24px;
        max-width: 1400px;
        width: 100%;
      }
      .card {
        background: #222;
        border-radius: 12px;
        overflow: hidden;
        text-align: center;
      }
      .card img {
        width: 100%;
        display: block;
      }
      .card p {
        padding: 12px;
        font-size: 18px;
        font-weight: 600;
      }
    </style>
  </head>
  <body>
    <h1>Slide 21: "Make setup easy" - Pick your favorite</h1>
    <div class="grid">
      <div class="card">
        <img src="slide21-v1.png" alt="Variation 1" />
        <p>#1</p>
      </div>
      <div class="card">
        <img src="slide21-v2.png" alt="Variation 2" />
        <p>#2</p>
      </div>
      <div class="card">
        <img src="slide21-v3.png" alt="Variation 3" />
        <p>#3</p>
      </div>
    </div>
  </body>
</html>
