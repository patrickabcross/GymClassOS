[build]
  command = "pnpm install --frozen-lockfile && NITRO_PRESET=netlify pnpm --filter @gymos/staff-web build"
  publish = "apps/staff-web/dist"
  functions = "apps/staff-web/.netlify/functions-internal"

[build.environment]
  NITRO_PRESET = "netlify"
  NPM_CONFIG_PRODUCTION = "false"

# A2A delegation calls run a full agent loop (LLM + tool calls + DB queries).
# The framework does not impose a default agent-run timeout; if a template
# sets AGENT_RUN_SOFT_TIMEOUT_MS, keep it below this function timeout so
# the hidden auto-continuation path can hand off before Netlify kills the
# function.
[functions."*"]
  timeout = 75
