[build]
  command = "pnpm install && NITRO_PRESET=netlify pnpm --filter @agent-native/docs build"
  publish = "packages/docs/dist"

# Slug redirects for renamed docs — keep in sync with SLUG_REDIRECTS in app/routes/docs.$slug.tsx.
[[redirects]]
  from = "/docs/resources"
  to = "/docs/workspace"
  status = 301
  force = true

[build.environment]
  NITRO_PRESET = "netlify"

# SSR pages: cache 1h, serve stale for 24h while revalidating
[[headers]]
  for = "/*"
  [headers.values]
    Cache-Control = "public, max-age=3600, stale-while-revalidate=86400"

# Static assets: immutable long cache
[[headers]]
  for = "/assets/*"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"

# Agent-native API routes: no caching
[[headers]]
  for = "/_agent-native/*"
  [headers.values]
    Cache-Control = "no-cache, no-store"
